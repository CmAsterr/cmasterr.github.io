<!doctype html>
<html lang="zh-CN">
<head>
    <!-- 引入 manifest -->
    <link rel="manifest" href="../manifest.json">
    <!-- 适配移动端视口 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 苹果设备的 PWA 图标和状态栏颜色 -->
    <link rel="apple-touch-icon" href="../images/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>PolyCalc - 稀疏判定 (iOS 26 完美适配版)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/app.css" />
    <link rel="stylesheet" href="../latex/katex/katex.min.css" />
    <script src="../latex/katex/katex.min.js"></script>

    <style>
        /* 1. iOS 26 基础环境适配 */
        body {
            color: var(--text-main);
            background-color: #000;
            transition: color 0.4s ease;
            margin: 0;
        }

        .ios-wallpaper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: var(--ios-wallpaper);
            background-size: cover;
            background-position: center;
            z-index: -2;
            /* 移除 transition 以匹配最新 index.html 逻辑 */
        }

        /* 2. 组件材质 */
        .glass-island, .ios-card {
            background: var(--glass-bg) !important;
            border-color: var(--glass-border) !important;
            transition: background 0.4s ease, border-color 0.4s ease !important;
        }

        /* 3. 模态框重构：完全对齐 index.html */
        .ios-modal {
            background: var(--modal-bg) !important;
            border-color: var(--glass-border) !important;
            backdrop-filter: blur(50px) saturate(180%) !important;
            -webkit-backdrop-filter: blur(50px) saturate(180%) !important;
            box-shadow: 0 30px 100px rgba(0,0,0,0.5) !important;
            border-radius: 28px !important;
        }

        .modal-body {
            padding: 0 24px 24px !important;
        }

        .ios-editor {
            background: transparent !important;
            box-shadow: none !important;
            border: none !important;
            color: var(--text-main) !important;
            padding: 15px 0 2px !important;
            margin-bottom: 0 !important;
            min-height: 32px !important;
            outline: none !important;
            font-size: 20px !important;
            font-family: 'JetBrains Mono', monospace !important;
            resize: none;
            line-height: 1.4;
        }

        .modal-preview-bar {
            background: var(--glass-inset) !important;
            border-radius: 20px !important;
            padding: 16px 20px !important;
            margin-top: 0px !important;
            border: none !important;
            transition: background 0.3s ease !important;
        }

        .preview-math {
            background: transparent !important;
            color: var(--text-main) !important;
            padding: 0 !important;
            min-height: 20px;
        }

        .preview-label {
            margin-bottom: 6px !important;
            font-size: 11px !important;
            font-weight: 800 !important;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.4;
            color: var(--text-main);
        }

        /* 4. 判定分析专修 */
        #sparseResult {
            line-height: 1.8;
            font-size: 16px;
            width: 100%;
        }

        /* 黑夜模式强制文字纯白 */
        :root[data-theme="dark"] #sparseResult,
        :root[data-theme="dark"] #sparseResult * {
            color: #ffffff !important;
        }

            :root[data-theme="dark"] #sparseResult b,
            :root[data-theme="dark"] #sparseResult strong {
                font-weight: 800;
            }

        /* 【核心修改】项数显示框：支持水平拉条与黑夜模式灰黑色背景 */
        .sparse-terms-box {
            margin: 15px 0 4px;
            padding: 14px 18px;
            border-radius: 14px;
            overflow-x: auto; /* 开启水平拉条 */
            white-space: nowrap;
            background: rgba(0, 0, 0, 0.05); /* 白天默认 */
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: background 0.4s ease;
        }

            /* iOS 风格极简拉条 */
            .sparse-terms-box::-webkit-scrollbar {
                height: 4px;
            }

            .sparse-terms-box::-webkit-scrollbar-thumb {
                background: rgba(0, 0, 0, 0.1);
                border-radius: 10px;
            }

        /* 黑夜模式背景：换为灰黑色 */
        :root[data-theme="dark"] .sparse-terms-box {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }

            :root[data-theme="dark"] .sparse-terms-box::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.2);
            }

        .term-sep {
            margin: 0 6px;
            opacity: 0.3;
        }

        /* 5. 阈值控制组 */
        .glass-control-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--glass-bg);
            padding: 10px 20px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            margin-bottom: 12px;
        }

        .glass-input-wrapper {
            display: flex;
            align-items: center;
            background: var(--glass-inset);
            border-radius: 12px;
            padding: 4px 12px;
        }

            .glass-input-wrapper input {
                border: none;
                background: transparent;
                width: 45px;
                font-weight: 700;
                text-align: center;
                outline: none;
                color: var(--accent-blue);
            }

        /* 6. 通用 UI 细节 */
        :root[data-theme="dark"] .tab.active {
            background: #fff !important;
            color: #1d1d1f !important;
        }

        :root[data-theme="dark"] .mini-actions button {
            background: rgba(255, 255, 255, 0.08) !important;
            color: rgba(255, 255, 255, 0.8) !important;
        }

        .glass-inset {
            background: var(--glass-inset) !important;
        }

        .tab, .card-title-row span {
            color: var(--text-sub) !important;
        }

            .tab.active, .brand, .modal-title, .result-highlight {
                color: var(--text-main) !important;
            }

        .ios-big-btn {
            background: var(--accent-blue) !important;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="ios-wallpaper"></div>

    <div class="app-container">
        <header class="glass-island">
            <div class="brand">PolyCalc</div>
            <div class="tabs-scroll-wrapper">
                <div class="tabs">
                    <a class="tab" href="./index.html">表达式化简</a>
                    <a class="tab active" href="./sparse.html">稀疏判定</a>
                    <a class="tab" href="./operate.html">多项式运算</a>
                    <a class="tab" href="./solve.html">解方程</a>
                    <a class="tab" href="./factor.html">因式分解</a>
                    <a class="tab" href="./eval.html">多项式求值</a>
                    <a class="tab" href="./plot.html">函数图像</a>
                </div>
            </div>
        </header>

        <main class="page-content">
            <section class="ios-card spring-touch">
                <div class="card-title-row">
                    <div class="icon-label"><span class="ios-icon" style="background: linear-gradient(135deg, #FF9500, #FFCC00);">ƒ</span><span>输入表达式</span></div>
                    <div class="mini-actions">
                        <button id="exprInEditBtn" class="ios-btn-pill">编辑</button>
                        <button id="exprInCopyBtn" class="ios-btn-circle" title="复制">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="content-wrapper">
                    <div id="exprInDisplay" class="math-display glass-inset"></div>
                </div>

                <div id="exprInPanel" class="ios-modal hidden">
                    <div class="modal-header">
                        <button id="exprInCancelBtn" class="text-btn cancel">取消</button>
                        <span class="modal-title">编辑公式</span>
                        <button id="exprInOkBtn" class="text-btn done">确认</button>
                    </div>
                    <div class="modal-body">
                        <textarea id="exprInInput" class="ios-editor" placeholder="(x+1)^2"></textarea>
                        <div class="modal-preview-bar">
                            <div class="preview-label">预览</div>
                            <div id="exprInPreview" class="preview-math math-scroll-view"></div>
                            <div id="exprInErr" class="error-msg"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="action-dock spring-touch">
                <div class="glass-control-group">
                    <label for="thresholdVal" style="font-size: 14px; font-weight: 800; opacity: 0.8;">稀疏阈值</label>
                    <div class="glass-input-wrapper">
                        <input type="number" id="thresholdVal" value="30" min="1" max="100" step="1">
                        <span class="addon" style="opacity:0.5; font-weight:800;">%</span>
                    </div>
                </div>
                <button id="btnSimplify" class="ios-big-btn"><span>开始判定</span></button>
                <div id="simplifyMsg" class="status-pill"></div>
            </section>

            <section class="ios-card spring-touch" style="animation-delay: 0.1s;">
                <div class="card-title-row">
                    <div class="icon-label"><span class="ios-icon" style="background: linear-gradient(135deg, #FF9500, #FFCC00);">📊</span><span>判定分析</span></div>
                </div>
                <div class="content-wrapper" style="background: transparent; padding: 0;">
                    <div id="sparseResult" class="glass-inset" style="min-height: 120px; width: 100%; border-radius: 24px; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
                        <div style="opacity: 0.5; font-style: italic;">等待计算...</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="copySuccessToast" class="copy-success-toast">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <span>已复制</span>
    </div>

    <script src="./js/poly_core.js"></script>
    <script src="./js/ui_shared.js"></script>
    <script src="./js/tabs_scroll.js"></script>
    <script src="./js/page_transition.js"></script>
    <script src="./js/page_sparse.js"></script>


    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
        // 注意路径：因为 html 文件在 html/ 目录下，所以 sw.js 在上一级目录
        navigator.serviceWorker.register('../sw.js')
            .then(registration => {
            console.log('ServiceWorker 注册成功:', registration.scope);
            })
            .catch(error => {
            console.log('ServiceWorker 注册失败:', error);
            });
        });
    }
    </script>
    </body>
</html>
